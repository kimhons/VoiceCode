packages:
  # Applications
  - 'apps/*'

  # Services (Node.js only)
  - 'services/voice-engine'

  # Shared packages
  - 'packages/*'
allowBuilds:
  core-js: set this to true or false
  esbuild: set this to true or false
  unrs-resolver: set this to true or false
onlyBuiltDependencies:
  - core-js
  - esbuild
  - unrs-resolver
