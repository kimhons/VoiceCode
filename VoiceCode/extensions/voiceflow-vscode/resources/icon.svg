<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0051D5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad)"/>
  
  <!-- Microphone body -->
  <rect x="108" y="70" width="40" height="65" rx="20" fill="white"/>
  
  <!-- Microphone stand -->
  <rect x="118" y="135" width="20" height="35" fill="white"/>
  
  <!-- Microphone base -->
  <rect x="95" y="165" width="66" height="10" rx="5" fill="white"/>
  
  <!-- Code brackets -->
  <text x="50" y="145" font-size="70" fill="white" font-family="monospace" font-weight="bold">{</text>
  <text x="175" y="145" font-size="70" fill="white" font-family="monospace" font-weight="bold">}</text>
  
  <!-- Sound waves (left) -->
  <path d="M 75 100 Q 65 110 75 120" stroke="white" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M 65 95 Q 50 110 65 125" stroke="white" stroke-width="4" fill="none" opacity="0.5"/>
  
  <!-- Sound waves (right) -->
  <path d="M 181 100 Q 191 110 181 120" stroke="white" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M 191 95 Q 206 110 191 125" stroke="white" stroke-width="4" fill="none" opacity="0.5"/>
</svg>

