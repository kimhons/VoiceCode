<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - VoiceCode</title>
  <meta name="description" content="You are currently offline. VoiceCode will reconnect automatically when your connection is restored.">
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      text-align: center;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-container {
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .offline-icon svg {
      width: 60px;
      height: 60px;
      stroke: #ffffff;
      stroke-width: 2;
      fill: none;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #ff6b6b;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    .status.online .status-dot {
      background: #51cf66;
      animation: none;
    }

    .retry-button {
      display: inline-block;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 1rem;
    }

    .retry-button:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .features {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .features h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .features ul {
      list-style: none;
      text-align: left;
      display: inline-block;
    }

    .features li {
      padding: 0.5rem 0;
      opacity: 0.85;
    }

    .features li::before {
      content: "✓ ";
      margin-right: 0.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <div class="offline-icon">
        <svg viewBox="0 0 24 24">
          <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"/>
          <path d="M9 17l3 3 3-3c-1.65-1.66-4.34-1.66-6 0z"/>
          <path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
          <line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <h1>You're Offline</h1>
    
    <p>
      It looks like you've lost your internet connection. 
      Don't worry, VoiceCode will automatically reconnect when you're back online.
    </p>

    <div class="status" id="status">
      <span class="status-dot"></span>
      <span id="status-text">Offline</span>
    </div>

    <button class="retry-button" onclick="location.reload()">
      Try Again
    </button>

    <div class="features">
      <h2>While you're offline:</h2>
      <ul>
        <li>Your data is safely stored locally</li>
        <li>Changes will sync when you reconnect</li>
        <li>Cached content remains accessible</li>
      </ul>
    </div>
  </div>

  <script>
    // Check online status
    function updateOnlineStatus() {
      const status = document.getElementById('status');
      const statusText = document.getElementById('status-text');
      
      if (navigator.onLine) {
        status.classList.add('online');
        statusText.textContent = 'Back Online!';
        // Automatically reload after 1 second
        setTimeout(() => {
          location.reload();
        }, 1000);
      } else {
        status.classList.remove('online');
        statusText.textContent = 'Offline';
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Check status on load
    updateOnlineStatus();
  </script>
</body>
</html>
