name: Agent Core Tests

on:
    push:
        branches: [main, develop]
        paths:
            - "services/agent-core/**"
    pull_request:
        branches: [main, develop]
        paths:
            - "services/agent-core/**"

env:
    PYTHON_VERSION: "3.11"
    WORKING_DIRECTORY: services/agent-core

jobs:
    lint:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -e ".[dev]"

            - name: Run Ruff linter
              run: ruff check src/ tests/

            - name: Run Ruff formatter check
              run: ruff format --check src/ tests/

            - name: Run MyPy type check
              run: mypy src/ --ignore-missing-imports

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: lint
        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -e ".[dev]"

            - name: Run unit tests
              env:
                  ENVIRONMENT: test
                  JWT_SECRET: test-secret-key
                  DATABASE_URL: postgresql://test:test@localhost:5432/test
                  SUPABASE_URL: https://test.supabase.co
                  SUPABASE_ANON_KEY: test-key
                  OPENAI_API_KEY: sk-test
              run: |
                  pytest tests/unit -v --tb=short --junitxml=junit-unit.xml

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: unit-test-results
                  path: ${{ env.WORKING_DIRECTORY }}/junit-unit.xml

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        needs: unit-tests
        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -e ".[dev]"

            - name: Run integration tests
              env:
                  ENVIRONMENT: test
                  JWT_SECRET: test-secret-key
                  DATABASE_URL: postgresql://test:test@localhost:5432/test
                  SUPABASE_URL: https://test.supabase.co
                  SUPABASE_ANON_KEY: test-key
                  OPENAI_API_KEY: sk-test
                  REDIS_URL: redis://localhost:6379
              run: |
                  pytest tests/integration -v --tb=short --junitxml=junit-integration.xml

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: integration-test-results
                  path: ${{ env.WORKING_DIRECTORY }}/junit-integration.xml

    coverage:
        name: Coverage Report
        runs-on: ubuntu-latest
        needs: [unit-tests, integration-tests]
        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -e ".[dev]"

            - name: Run tests with coverage
              env:
                  ENVIRONMENT: test
                  JWT_SECRET: test-secret-key
                  DATABASE_URL: postgresql://test:test@localhost:5432/test
                  SUPABASE_URL: https://test.supabase.co
                  SUPABASE_ANON_KEY: test-key
                  OPENAI_API_KEY: sk-test
              run: |
                  pytest tests/ --cov=src --cov-report=xml --cov-report=html

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: |
                      ${{ env.WORKING_DIRECTORY }}/coverage.xml
                      ${{ env.WORKING_DIRECTORY }}/htmlcov/

            - name: Coverage summary
              run: |
                  coverage report --fail-under=60
